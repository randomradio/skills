# Documentation schema for learnings written by rr:compound.
# Treat this as the canonical frontmatter contract for docs/solutions/.

tracks:
  bug:
    description: "Defects, failures, and errors that were diagnosed and fixed"
    problem_types:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
  knowledge:
    description: "Practices, patterns, conventions, decisions, workflow improvements, and documentation"
    problem_types:
      - best_practice
      - documentation_gap
      - workflow_issue
      - developer_experience
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention

required_fields:
  title:
    type: string
    description: "Clear, searchable title"
  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date documented (YYYY-MM-DD)"
  category:
    type: string
    description: "docs/solutions subdirectory name"
  module:
    type: string
    description: "Module or area affected"
  problem_type:
    type: enum
    values:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
      - developer_experience
      - workflow_issue
      - best_practice
      - documentation_gap
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention
  component:
    type: enum
    values:
      - backend
      - frontend
      - database
      - api
      - cli
      - testing_framework
      - development_workflow
      - documentation
      - tooling
      - authentication
      - payments
      - deployment
      - integration
      - assistant
  severity:
    type: enum
    values:
      - critical
      - high
      - medium
      - low

track_rules:
  bug:
    required:
      symptoms:
        type: array[string]
        min_items: 1
        max_items: 5
      root_cause:
        type: enum
        values:
          - wrong_api
          - scope_issue
          - async_timing
          - config_error
          - logic_error
          - test_isolation
          - missing_validation
          - missing_permission
          - missing_workflow_step
          - inadequate_documentation
          - missing_tooling
          - incomplete_setup
          - dependency_mismatch
          - data_shape_mismatch
      resolution_type:
        type: enum
        values:
          - code_fix
          - migration
          - config_change
          - test_fix
          - dependency_update
          - environment_setup
          - workflow_improvement
          - documentation_update
          - tooling_addition
  knowledge:
    optional:
      applies_when:
        type: array[string]
        max_items: 5
      symptoms:
        type: array[string]
        max_items: 5
      root_cause:
        type: string
      resolution_type:
        type: string

optional_fields:
  related_components:
    type: array[string]
  tags:
    type: array[string]
    max_items: 8
  last_updated:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'

validation_rules:
  - "Determine track from problem_type using the tracks section."
  - "All shared required fields must be present."
  - "Bug-track required fields must be present on bug-track docs."
  - "Enum fields must match allowed values exactly."
  - "Array fields must respect min/max item counts."
  - "date and last_updated must match YYYY-MM-DD."
